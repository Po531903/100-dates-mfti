    <style>
        :root {
            --mipt-blue: #1a4d8f;
            --mipt-light: #e8f0f8;
            --mipt-dark: #0d2847;
        }
        body {
            background: linear-gradient(135deg, var(--mipt-light) 0%, #fff 100%);
            min-height: 100vh;
        }
        .navbar {
            background: var(--mipt-blue) !important;
            box-shadow: 0 4px 15px rgba(26, 77, 143, 0.3);
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
        }
        .card {
            border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 16px;
        }
        .calendar-header {
            background: var(--mipt-blue);
            color: white;
            border-radius: 16px 16px 0 0;
            padding: 20px;
        }
        .calendar-day {
            text-align: center;
            padding: 8px;
            border: 1px solid #e8e8e8;
            min-height: 75px;
            background: white;
            transition: all 0.2s;
            cursor: default;
        }
        .calendar-day:hover {
            background: var(--mipt-light);
        }
        .calendar-day.has-event {
            background: linear-gradient(135deg, var(--mipt-blue), #2a5fa0);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .calendar-day.has-event:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(26, 77, 143, 0.4);
            z-index: 10;
            position: relative;
        }
        .calendar-day.other-month {
            background: #f5f5f5;
            color: #bbb;
        }
        .day-number {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .event-indicator {
            font-size: 0.7rem;
            margin-top: 3px;
            opacity: 0.9;
        }
        .modal-header {
            background: var(--mipt-blue);
            color: white;
        }
        .btn-mipt {
            background: var(--mipt-blue);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            transition: all 0.3s;
        }
        .btn-mipt:hover {
            background: var(--mipt-dark);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(26, 77, 143, 0.4);
        }
        .nav-btn {
            background: white;
            border: 2px solid var(--mipt-blue);
            color: var(--mipt-blue);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            text-decoration: none;
        }
        .nav-btn:hover {
            background: var(--mipt-blue);
            color: white;
        }
        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .category-science { background: #e8f5e9; color: #2e7d32; }
        .category-culture { background: #fff3e0; color: #ef6c00; }

        .category-education { background: #f3e5f5; color: #7b1fa2; }

            color: white;

        let currentMonth = new Date().getMonth() + 1;
        let currentYear = 2026;

        const monthNames = [
            'Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
            'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'
        ];

        const categoryNames = {
            'history': 'История',
            'science': 'Наука',
            'culture': 'Культура',
            'sport': 'Спорт',
            'education': 'Образование'
        };

        function getEventsForDate(year, month, day) {
            const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            return events.filter(e => e.date === dateStr);
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthYearEl = document.getElementById('monthYear');
            
            monthYearEl.textContent = monthNames[currentMonth - 1];
            
            const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
            let firstDayIndex = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
            const daysInPrevMonth = new Date(currentYear, currentMonth - 1, 0).getDate();
            
            let html = '';
            
            // Prev month days
            for (let i = firstDayIndex - 1; i >= 0; i--) {
                html += `<div class="col"><div class="calendar-day other-month"><div class="day-number">${daysInPrevMonth - i}</div></div></div>`;
            }
            
            // Current month days
            for (let day = 1; day <= daysInMonth; day++) {
                const dayEvents = getEventsForDate(currentYear, currentMonth, day);
                const hasEvent = dayEvents.length > 0;
                const eventClass = hasEvent ? 'has-event' : '';
                const onclick = hasEvent ? `onclick="showModal(${currentYear}, ${currentMonth}, ${day})"` : '';
                const indicator = hasEvent ? '<div class="event-indicator"><i class="bi bi-star-fill"></i></div>' : '';
                
                html += `<div class="col"><div class="calendar-day ${eventClass}" ${onclick}><div class="day-number">${day}</div>${indicator}</div></div>`;
            }
            
            // Next month days
            const totalCells = Math.ceil((firstDayIndex + daysInMonth) / 7) * 7;
            const remainingCells = totalCells - (firstDayIndex + daysInMonth);
            for (let day = 1; day <= remainingCells; day++) {
                html += `<div class="col"><div class="calendar-day other-month"><div class="day-number">${day}</div></div></div>`;
            }
            
            grid.innerHTML = html;
        }

        function showModal(year, month, day) {
            const dayEvents = getEventsForDate(year, month, day);
            if (dayEvents.length === 0) return;
            
            const event = dayEvents[0];
            const modal = new bootstrap.Modal(document.getElementById('dateModal'));
            document.getElementById('modalTitle').textContent = event.title;
            document.getElementById('modalBody').innerHTML = `
                <span class="category-badge category-${event.category}">${categoryNames[event.category]}</span>
                <p class="mt-3 mb-0">${event.description}</p>
            `;
            modal.show();
        }

        document.getElementById('prevMonth').addEventListener('click', (e) => {
            e.preventDefault();
            currentMonth--;
            if (currentMonth < 1) {
                currentMonth = 12;
            }
            renderCalendar();
        });

        document.getElementById('nextMonth').addEventListener('click', (e) => {
            e.preventDefault();
            currentMonth++;
            if (currentMonth > 12) {
                currentMonth = 1;
            }
            renderCalendar();
        });

        renderCalendar();
    </script>
