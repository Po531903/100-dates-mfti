<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 дат МФТИ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --mipt-blue: #1a4d8f;
            --mipt-light: #e8f0f8;
            --mipt-dark: #0d2847;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        body {
            background: linear-gradient(135deg, var(--mipt-light) 0%, #fff 100%);
            min-height: 100vh;
            padding-bottom: 0;
        }
        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: var(--mipt-blue);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .fullscreen-btn:hover {
            background: var(--mipt-dark);
        }
        .navbar {
            background: var(--mipt-blue) !important;
            box-shadow: 0 4px 15px rgba(26, 77, 143, 0.3);
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
        }
        .card {
            border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 16px;
        }
        .calendar-header {
            background: var(--mipt-blue);
            color: white;
            border-radius: 16px 16px 0 0;
            padding: 20px;
        }
        .calendar-day {
            text-align: center;
            padding: 8px;
            border: 1px solid #e8e8e8;
            min-height: 120px;
            background: white;
            transition: all 0.2s;
            cursor: default;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        .calendar-day:hover {
            background: var(--mipt-light);
        }
        .calendar-day.has-event {
            background: linear-gradient(135deg, var(--mipt-blue), #2a5fa0);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .calendar-day.has-event:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(26, 77, 143, 0.4);
            z-index: 10;
            position: relative;
        }
        .calendar-day.other-month {
            background: #f5f5f5;
            color: #bbb;
        }
        .day-number {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .event-indicator {
            font-size: 0.7rem;
            margin-top: 3px;
            opacity: 0.9;
        }
        .modal-header {
            background: var(--mipt-blue);
            color: white;
        }
        .btn-mipt {
            background: var(--mipt-blue);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            transition: all 0.3s;
        }
        .btn-mipt:hover {
            background: var(--mipt-dark);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(26, 77, 143, 0.4);
        }
        .nav-btn {
            background: white;
            border: 2px solid var(--mipt-blue);
            color: var(--mipt-blue);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            text-decoration: none;
        }
        .nav-btn:hover {
            background: var(--mipt-blue);
            color: white;
        }
        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .category-history { background: #e3f2fd; color: #1565c0; }
        .category-science { background: #e8f5e9; color: #2e7d32; }
        .category-culture { background: #fff3e0; color: #ef6c00; }
        .category-sport { background: #fce4ec; color: #c2185b; }
        .category-education { background: #f3e5f5; color: #7b1fa2; }
        .footer {
            background: var(--mipt-blue);
            color: white;
            padding: 20px 0;
            margin-top: 40px;
        }
    </style>
</head>
<body class="d-flex flex-column h-100">
    <button class="fullscreen-btn" id="fullscreenBtn" title="На весь экран">
        <i class="bi bi-arrows-fullscreen"></i>
    </button>

    <nav class="navbar navbar-expand-lg navbar-dark mb-0">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-calendar-event me-2"></i>100 дат МФТИ
            </a>
        </div>
    </nav>

    <main class="container-fluid flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-12">
                <div class="card">
                    <div class="calendar-header text-center py-3">
                        <div class="d-flex justify-content-between align-items-center px-3">
                            <a href="#" class="nav-btn" id="prevMonth">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                            <div>
                                <h2 class="mb-0" id="monthYear"></h2>
                            </div>
                            <a href="#" class="nav-btn" id="nextMonth">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </div>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-0 text-center fw-bold mb-2">
                            <div class="col-1">Пн</div>
                            <div class="col-1">Вт</div>
                            <div class="col-1">Ср</div>
                            <div class="col-1">Чт</div>
                            <div class="col-1">Пт</div>
                            <div class="col-1"><span class="text-danger">Сб</span></div>
                            <div class="col-1"><span class="text-danger">Вс</span></div>
                        </div>
                        <div id="calendarGrid" class="row g-0"></div>
                        
                        <div class="text-center mt-4">
                            <p class="text-muted mb-2">
                                <i class="bi bi-info-circle me-1"></i>
                                Нажмите на выделенную дату, чтобы узнать о событии
                            </p>
                            <div class="d-flex justify-content-center gap-3 flex-wrap">
                                <span class="category-badge category-history"><i class="bi bi-book me-1"></i>История</span>
                                <span class="category-badge category-science"><i class="bi bi-lightbulb me-1"></i>Наука</span>
                                <span class="category-badge category-culture"><i class="bi bi-palette me-1"></i>Культура</span>
                                <span class="category-badge category-sport"><i class="bi bi-trophy me-1"></i>Спорт</span>
                                <span class="category-badge category-education"><i class="bi bi-mortarboard me-1"></i>Образование</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    

    <div class="modal fade" id="dateModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Дата</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const events = [
            { date: "1938-12-04", title: "Идея о высшей политехнической школе", description: "В газете «Правда» вышла статья о необходимости создания высшей политехнической школы, что стало началом «Системы физтеха».", category: "history" },
            { date: "1946-03-10", title: "Постановление о Высшей физико-технической школе", description: "Совет Народных Комиссаров СССР принял решение «Об организации Высшей физико-технической школы СССР».", category: "history" },
            { date: "1946-11-25", title: "Основание физико-технического факультета МГУ (Физтеха)", description: "В этот день вышло постановление Совета Министров СССР о создании физико-технического факультета (ФТФ) МГУ. Эта дата считается днём рождения Физтеха.", category: "history" },
            { date: "1947-08-17", title: "Определение места размещения МФТИ", description: "И. В. Сталин издал распоряжение о срочном переселении студентов физико-технического факультета МГУ из учебного корпуса на станцию Долгопрудная (1-й проезд, дом 4/2).", category: "history" },
            { date: "1951-09-17", title: "Создание самостоятельного МФТИ", description: "Физтех выделен из состава МГУ в самостоятельный институт. В его состав вошли четыре факультета: радиотехнический, радиофизический, аэромеханический и физико-химический.", category: "history" },
            { date: "1952-04-01", title: "Назначение первого ректора МФТИ", description: "Генерал-лейтенант авиации Иван Фёдорович Петров был назначен директором, а позже — первым ректором МФТИ. Также в этом году был написан “первоначальный” гимн физтеха.", category: "history" },
            { date: "1953-01-01", title: "Первый выпуск «коренных» физтехов", description: "Состоялся первый выпуск студентов, поступивших уже непосредственно на Физтех. Дипломы получили 38 человек — те, кто остался из 118 человек, зачисленных на 1-й курс в 1947 году.", category: "education" },
            { date: "1954-07-29", title: "Создание военной кафедры МФТИ", description: "Создана военная кафедра МФТИ в соответствии с Постановлением Совета Министров СССР.", category: "education" },
            { date: "1955-10-12", title: "Открытие ФОПФ", description: "Дата открытия факультета общей и прикладной физики (ФОПФ).", category: "education" },
            { date: "1956-01-01", title: "Открытие ФРТК", description: "Дата открытия факультета радиотехники и кибернетики (ФРТК).", category: "education" },
            { date: "1956-01-01", title: "Нобелевская премия Н.Н. Семёнова", description: "Дата получения Николаем Семёновичем Нобелевской премии по химии (совместно с Сирилом Хиншелвудом) за разработку теории цепных реакций.", category: "science" },
            { date: "1957-06-01", title: "Открытие учебного полигона", description: "Научно-учебный полигон в посёлке Орехово введён в эксплуатацию.", category: "education" },
            { date: "1957-01-01", title: "Создание ФМХФ", description: "Дата основания факультета молекулярной и химической физики (ФМХФ).", category: "education" },
            { date: "1958-09-01", title: "Первый номер газеты «За науку»", description: "Стенная газета «За науку» была реорганизована в многотиражку. В 2013 году издание было перезапущено как глянцевый научно-популярный иллюстрированный журнал.", category: "culture" },
            { date: "1958-01-01", title: "Совершенствование МФТИ", description: "Было построено здание первой столовой института. В том же году на Физтехе открылась аспирантура, были открыты здравпункт МФТИ и профилакторий.", category: "history" },
            { date: "1958-01-01", title: "Нобелевская премия И.Е. Тамма", description: "Дата получения Игорем Евгеньевичем Таммом Нобелевской премии по физике (совместно с Павлом Черенковым и Ильёй Франком) за открытие и истолкование эффекта Черенкова.", category: "science" },
            { date: "1961-01-25", title: "А.В. Беляков — проректор МФТИ", description: "Александр Васильевич Беляков, Герой Советского Союза, занимал должность проректора по научной и учебной работе в МФТИ.", category: "history" },
            { date: "1962-11-01", title: "Нобелевская премия Л.Д. Ландау", description: "Лев Давидович Ландау получил Нобелевскую премию по физике за пионерские исследования в теории конденсированного состояния, в особенности жидкого гелия.", category: "science" },
            { date: "1962-01-01", title: "Ректор О.М. Белоцерковский", description: "Дата назначения Олега Михайловича Белоцерковского ректором МФТИ. Начался период расцвета Физтеха. Он оставался на посту ректора 25 лет.", category: "history" },
            { date: "1964-05-01", title: "Создание ФФКЭ", description: "Был организован факультет физической и квантовой электроники (ФФКЭ).", category: "education" },
            { date: "1965-06-10", title: "Создание ФАЛТ", description: "Создан факультет аэромеханики и летательной техники (ФАЛТ).", category: "education" },
            { date: "1967-01-01", title: "Орден Трудового Красного Знамени", description: "Московский физико-технический институт награждён орденом Трудового Красного Знамени. Также в этом году был построен главный корпус МФТИ.", category: "history" },
            { date: "1969-07-19", title: "Создание ФУПМ", description: "В Московском физико-техническом институте (МФТИ) появился факультет управления и прикладной математики (ФУПМ).", category: "education" },
            { date: "1975-03-04", title: "Открытие астероида «Физтех»", description: "Тамара Михайловна Смирнова в Крымской астрофизической обсерватории открыла астероид, позже названный в честь Физтеха. Название было предложено в честь 50-летия МФТИ в 1996 году.", category: "science" },
            { date: "1975-08-08", title: "Создание ФПФЭ", description: "Совместным постановлением Президиума Академии наук СССР и Министерства высшего и среднего образования РСФСР было принято решение о создании факультета проблем физики и энергетики (ФПФЭ) в МФТИ.", category: "education" },
            { date: "1978-12-10", title: "Нобелевская премия П.Л. Капицы", description: "Дата вручения Нобелевской премии по физики академику Петру Леонидовичу Капице за его базовые исследования и открытия в физике низких температур.", category: "science" },
            { date: "1982-01-01", title: "Создание ФФХБ", description: "Создан факультет физико-химической биологии (ФФХБ).", category: "education" },
            { date: "1982-08-19", title: "Первый космический полёт выпускника МФТИ", description: "Александр Александрович Серебров – первый выпускник МФТИ, полетевший в космос. Позже совершил ещё три полёта. 27 августа 1982 года Указом Президиума Верховного Совета СССР он получил звание Героя Советского Союза.", category: "science" },
            { date: "1991-01-01", title: "Основание физтех-лицея", description: "Начало работы физико-технического лицея имени П. Л. Капицы, специализированного учебного заведения для старшеклассников.", category: "education" },
            { date: "1997-01-01", title: "Создание ФМБФ", description: "Создан факультет молекулярной и биологической физики (ФМБФ). Факультет был создан на базе факультетов физико-химической биологии (ФФХБ) и молекулярной и химической физики (ФМХФ).", category: "education" },
            { date: "1999-06-01", title: "Переход на Болонскую систему", description: "Переход Московского физико-технического института (МФТИ) на Болонскую систему обучения «бакалавр — магистр».", category: "education" },
            { date: "2005-12-27", title: "Создание ФИВТ", description: "Создан факультет инноваций и высоких технологий (ФИВТ).", category: "education" },
            { date: "2006-01-01", title: "Факультет нанотехнологий", description: "В Московском физико-техническом институте (МФТИ) был открыт факультет нанотехнологий и информатики (ФНТИ). В 2009 году факультет был переименован в факультет нано-, био-, информационных и когнитивных технологий (ФНБИК).", category: "education" },
            { date: "2009-11-02", title: "Национальный исследовательский университет", description: "МФТИ вошёл в число ведущих исследовательских вузов России, получив статус национального исследовательского университета.", category: "education" },
            { date: "2010-10-05", title: "Нобелевская премия Гейма и Новосёлова", description: "Выпускники МФТИ Андрей Гейм и Константин Новоселов получили Нобелевскую премию по физику за «новаторские эксперименты по исследованию двумерного материала графена».", category: "science" },
            { date: "2021-09-11", title: "Открытие памятника отцам-основателям МФТИ", description: "Открыт памятник П.Л. Капице, Н.Н. Семенову и Л.Д. Ландау — отцам-основателям МФТИ.", category: "history" },
            { date: "2023-09-07", title: "Открытие станции метро «Физтех»", description: "Была открыта станция метро салатовой ветки, названная в честь физтеха.", category: "history" },
            { date: "2023-10-10", title: "Открытие памятника А.В. Белякову", description: "Открыт памятник Герою Советского Союза Александру Белякову.", category: "history" }
        ];

        let currentMonth = new Date().getMonth() + 1;
        let currentYear = 2026;

        const monthNames = [
            'Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
            'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'
        ];

        const categoryNames = {
            'history': 'История',
            'science': 'Наука',
            'culture': 'Культура',
            'sport': 'Спорт',
            'education': 'Образование',
            'person': 'Деятель'
        };

        function getEventsForDate(year, month, day) {
            const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            return events.filter(e => e.date === dateStr);
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthYearEl = document.getElementById('monthYear');
            
            monthYearEl.textContent = monthNames[currentMonth - 1]; // + ' ' + currentYear
            
            const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
            let firstDayIndex = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
            const daysInPrevMonth = new Date(currentYear, currentMonth - 1, 0).getDate();
            
            let html = '';
            
            // Prev month days
            for (let i = firstDayIndex - 1; i >= 0; i--) {
                html += `<div class="col-1"><div class="calendar-day other-month"><div class="day-number">${daysInPrevMonth - i}</div></div></div>`;
            }
            
            // Current month days
            for (let day = 1; day <= daysInMonth; day++) {
                const dayEvents = getEventsForDate(currentYear, currentMonth, day);
                const hasEvent = dayEvents.length > 0;
                const eventClass = hasEvent ? 'has-event' : '';
                const onclick = hasEvent ? `onclick="showModal(${currentYear}, ${currentMonth}, ${day})"` : '';
                const indicator = hasEvent ? '<div class="event-indicator"><i class="bi bi-star-fill"></i></div>' : '';
                
                html += `<div class="col-1"><div class="calendar-day ${eventClass}" ${onclick}><div class="day-number">${day}</div>${indicator}</div></div>`;
            }
            
            // Next month days
            const totalCells = Math.ceil((firstDayIndex + daysInMonth) / 7) * 7;
            const remainingCells = totalCells - (firstDayIndex + daysInMonth);
            for (let day = 1; day <= remainingCells; day++) {
                html += `<div class="col-1"><div class="calendar-day other-month"><div class="day-number">${day}</div></div></div>`;
            }
            
            grid.innerHTML = html;
        }

        function showModal(year, month, day) {
            const dayEvents = getEventsForDate(year, month, day);
            if (dayEvents.length === 0) return;
            
            const modal = new bootstrap.Modal(document.getElementById('dateModal'));
            
            let eventsHtml = dayEvents.map(event => `
                <div class="mb-3">
                    <span class="category-badge category-${event.category}">${categoryNames[event.category]}</span>
                    <h5 class="mt-2">${event.title}</h5>
                    <p class="mb-0">${event.description}</p>
                </div>
            `).join('');
            
            const dateObj = new Date(year, month - 1, day);
            const dateStr = dateObj.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
            
            document.getElementById('modalTitle').textContent = dateStr;
            document.getElementById('modalBody').innerHTML = eventsHtml;
            modal.show();
        }

        document.getElementById('prevMonth').addEventListener('click', (e) => {
            e.preventDefault();
            currentMonth--;
            if (currentMonth < 1) {
                currentMonth = 12;
                currentYear--;
            }
            renderCalendar();
        });

        document.getElementById('nextMonth').addEventListener('click', (e) => {
            e.preventDefault();
            currentMonth++;
            if (currentMonth > 12) {
                currentMonth = 1;
                currentYear++;
            }
            renderCalendar();
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        renderCalendar();
    </script>
</body>
</html>
