<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 дат МФТИ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --mipt-blue: #1a4d8f;
            --mipt-light: #e8f0f8;
            --mipt-dark: #0d2847;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        body {
            background: linear-gradient(135deg, var(--mipt-light) 0%, #fff 100%);
            min-height: 100vh;
            padding-bottom: 0;
        }
        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: var(--mipt-blue);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .fullscreen-btn:hover {
            background: var(--mipt-dark);
        }
        .navbar {
            background: var(--mipt-blue) !important;
            box-shadow: 0 4px 15px rgba(26, 77, 143, 0.3);
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
        }
        .card {
            border: none;
            box-shadow: 0 6px 30px rgba(0,0,0,0.15);
            border-radius: 24px;
        }
        .calendar-header {
            background: var(--mipt-blue);
            color: white;
            border-radius: 24px 24px 0 0;
            padding: 30px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            width: 75%;
            margin: 0 auto;
        }
        .calendar-header-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 10px;
            width: 75%;
            margin-left: auto;
            margin-right: auto;
        }
.calendar-day {
            text-align: center;
            padding: 6px;
            border: 1.5px solid #e8e8e8;
            border-radius: 12px;
            min-height: 75px;
            background: white;
            transition: all 0.2s;
            cursor: default;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            width: 100%;
            box-sizing: border-box;
        }
        .calendar-day:hover {
            background: var(--mipt-light);
        }
        .calendar-day.has-event {
            background: linear-gradient(135deg, var(--mipt-blue), #2a5fa0);
            color: white;
            cursor: pointer;
            font-weight: bold;
            border: 4.5px solid var(--mipt-dark);
            box-shadow: 0 0 15px rgba(26, 77, 143, 0.5);
        }
        .calendar-day.has-event:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 22px rgba(26, 77, 143, 0.4);
            z-index: 10;
            position: relative;
        }
        .calendar-day.other-month {
            background: #f5f5f5;
            color: #bbb;
        }
        .day-number {
            font-size: 1.3rem;
            font-weight: 600;
        }
        .event-indicator {
            font-size: 0.7rem;
            margin-top: 3px;
            opacity: 0.9;
        }
        .modal-header {
            background: var(--mipt-blue);
            color: white;
        }
        .btn-mipt {
            background: var(--mipt-blue);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            transition: all 0.3s;
        }
        .btn-mipt:hover {
            background: var(--mipt-dark);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(26, 77, 143, 0.4);
        }
        .nav-btn {
            background: white;
            border: 2px solid var(--mipt-blue);
            color: var(--mipt-blue);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            text-decoration: none;
        }
        .nav-btn:hover {
            background: var(--mipt-blue);
            color: white;
        }
        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .category-history { background: #e3f2fd; color: #1565c0; }
        .category-science { background: #e8f5e9; color: #2e7d32; }
        .category-culture { background: #fff3e0; color: #ef6c00; }
        .category-sport { background: #fce4ec; color: #c2185b; }
        .category-education { background: #f3e5f5; color: #7b1fa2; }
        .category-person { background: #fff8e1; color: #f57c00; }
        .footer {
            background: var(--mipt-blue);
            color: white;
            padding: 20px 0;
            margin-top: 40px;
        }
        @media (max-width: 767.98px) {
            .calendar-day {
                min-height: 40px;
                padding: 2px;
            }
            .day-number {
                font-size: 0.9rem;
            }
            .event-indicator {
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body class="d-flex flex-column h-100">
    <button class="fullscreen-btn" id="fullscreenBtn" title="На весь экран">
        <i class="bi bi-arrows-fullscreen"></i>
    </button>

    <nav class="navbar navbar-expand-lg navbar-dark mb-0">
        <div class="container">
            <a class="navbar-brand d-none d-md-block" href="#">
                <i class="bi bi-calendar-event me-2"></i>100 дат МФТИ
            </a>
        </div>
    </nav>

    <main class="container-fluid flex-grow-1 d-flex flex-column align-items-center pt-2">
        <div class="text-center">
            <h1 class="display-2 fw-bold mb-1" style="color: var(--mipt-blue);">100 дат МФТИ</h1>
        </div>
        <div class="w-100" style="max-width: 1400px;">
            <div class="col-12">
                <div class="card">
                    <div class="calendar-header text-center py-3">
                        <div class="d-flex justify-content-between align-items-center px-3">
                            <a href="#" class="nav-btn" id="prevMonth">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                            <div>
                                <h2 class="mb-0" id="monthYear"></h2>
                            </div>
                            <a href="#" class="nav-btn" id="nextMonth">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </div>
                    </div>
                    <div class="card-body p-5">
                        <div class="calendar-header-row text-center fw-bold">
                            <div>Пн</div>
                            <div>Вт</div>
                            <div>Ср</div>
                            <div>Чт</div>
                            <div>Пт</div>
                            <div><span class="text-danger">Сб</span></div>
                            <div><span class="text-danger">Вс</span></div>
                        </div>
                        <div id="calendarGrid" class="calendar-grid"></div>
                        
                        <div class="text-center mt-4">
                            <p class="text-muted mb-2">
                                <i class="bi bi-info-circle me-1"></i>
                                Нажмите на выделенную дату, чтобы узнать о событии
                            </p>
                            <div class="d-flex justify-content-center gap-3 flex-wrap">
                                <span class="category-badge category-history"><i class="bi bi-book me-1"></i>История</span>
                                <span class="category-badge category-science"><i class="bi bi-lightbulb me-1"></i>Наука</span>
                                <span class="category-badge category-culture"><i class="bi bi-palette me-1"></i>Культура</span>
                                <span class="category-badge category-sport"><i class="bi bi-trophy me-1"></i>Спорт</span>
                                <span class="category-badge category-education"><i class="bi bi-mortarboard me-1"></i>Образование</span>
                                <span class="category-badge category-person"><i class="bi bi-person me-1"></i>Деятель</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    

    <div class="modal fade" id="dateModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Дата</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const events = [
            { date: "1938-12-04", title: "Публикация идеи о высшей политехнической школе", description: "4 декабря 1938 года – публикация идеи о высшей политехнической школе. В газете «Правда» вышла статья о необходимости создания высшей политехнической школы, что стало началом «Системы физтеха».\n\n📌 Из интересного: Документы по Физтеху, в том числе устав, подготовила группа учёных. Ноябрьским вечером бумаги были опущены в почтовый ящик у Спасских ворот Кремля. Утром их подписали, и состоялось Постановление Совмина.", category: "history" },
            { date: "1946-03-10", title: "Постановление о Высшей физико-технической школе", description: "10 марта 1946 года — постановление о Высшей физико-технической школе. Совет Народных Комиссаров СССР принял решение «Об организации Высшей физико-технической школы СССР».\n\n📌 Из интересного: Почему поступают не В физтех, а НА физтех? Раньше поступали В МГУ НА физтех. С тех пор этот предлог так и остался.", category: "history" },
            { date: "1946-11-25", title: "Основание физико-технического факультета МГУ", description: "25 ноября 1946 года — дата основания физико-технического факультета МГУ (Физтеха). В этот день вышло постановление Совета Министров СССР о создании физико-технического факультета (ФТФ) МГУ. Эта дата считается днём рождения Физтеха.", category: "history" },
            { date: "1947-08-17", title: "Определение места размещения МФТИ", description: "17 августа 1947 года – «определение места размещения МФТИ». И. В. Сталин издал распоряжение о срочном переселении студентов физико-технического факультета МГУ из учебного корпуса на станцию Долгопрудная (1-й проезд, дом 4/2).", category: "history" },
            { date: "1951-09-17", title: "Создание самостоятельного МФТИ", description: "17 сентября 1951 года – создание самостоятельного МФТИ. Физтех выделен из состава МГУ в самостоятельный институт. В его состав вошли четыре факультета: радиотехнический, радиофизический, аэромеханический и физико-химический.", category: "history" },
            { date: "1952-04-01", title: "Назначение первого ректора МФТИ", description: "Апрель 1952 года – назначение первого ректора МФТИ. Генерал-лейтенант авиации Иван Фёдорович Петров был назначен директором, а позже — первым ректором МФТИ.", category: "history" },
            { date: "1953-01-01", title: "Первый выпуск «коренных» физтехов", description: "1953 год – первый выпуск «коренных» физтехов. Состоялся первый выпуск студентов, поступивших уже непосредственно на Физтех. Дипломы получили 38 человек — те, кто остался из 118 человек, зачисленных на 1-й курс в 1947 году.\n\n📌 Из интересного: В 1953 году МФТИ принадлежал Министерству культуры СССР.", category: "education" },
            { date: "1954-07-29", title: "Создание военной кафедры МФТИ", description: "29 июля 1954 года - дата создания военной кафедры МФТИ в соответствии с Постановлением Совета Министров СССР.", category: "education" },
            { date: "1955-10-12", title: "Открытие ФОПФ", description: "12 октября 1955 года – дата открытия факультета общей и прикладной физики (ФОПФ).", category: "education" },
            { date: "1956-01-01", title: "Открытие ФРТК и Нобелевская премия Семёнова", description: "1956 год — дата открытия факультета радиотехники и кибернетики (ФРТК). Также в 1956 году — дата получения Николаем Семёновым Нобелевской премии по химии (совместно с Сирилом Хиншелвудом) за разработку теории цепных реакций.", category: "science" },
            { date: "1957-06-01", title: "Открытие учебного полигона", description: "1957 год – открытие учебного полигона. Научно-учебный полигон в посёлке Орехово введён в эксплуатацию.", category: "education" },
            { date: "1957-01-01", title: "Создание ФМХФ", description: "1957 год — дата основания факультета молекулярной и химической физики (ФМХФ).", category: "education" },
            { date: "1958-09-01", title: "Первый номер газеты «За науку»", description: "1 сентября 1958 года – первый номер газеты «За науку». Стенная газета была реорганизована в многотиражку. В 2013 году издание было перезапущено как глянцевый научно-популярный журнал.", category: "culture" },
            { date: "1958-01-01", title: "Совершенствование МФТИ", description: "1958 год – «Совершенствование МФТИ». Было построено здание первой столовой института. В том же году на Физтехе открылась аспирантура, были открыты здравпункт и профилакторий.", category: "history" },
            { date: "1894-07-08", title: "Рождение П.Л. Капицы", description: "8 июля 1894 года (26 июня по ст. стилю) — дата рождения Петра Леонидовича Капицы. Один из основателей МФТИ. Лауреат Нобелевской премии по физике 1978 года.", category: "person" },
            { date: "1895-07-08", title: "Рождение И.Е. Тамма", description: "8 июля 1895 года — дата рождения Игоря Евгеньевича Тамма. Автор фундаментального курса «Основы теории электричества». Заведовал кафедрой теоретической физики МФТИ в 1943–1950 годах. Нобелевская премия 1958 года за эффект Черенкова.", category: "person" },
            { date: "1896-04-03", title: "Рождение Н.Н. Семёнова", description: "3 (15) апреля 1896 года — дата рождения Николая Николаевича Семёнова. Один из основателей МФТИ. Нобелевская премия по химии 1956 года за разработку теории цепных реакций.", category: "person" },
            { date: "1897-09-24", title: "Рождение И.Ф. Петрова", description: "24 сентября 1897 года — дата рождения Ивана Фёдоровича Петрова. Первый ректор МФТИ (1952–1962). Герой Советского Союза.", category: "person" },
            { date: "1897-12-21", title: "Рождение А.В. Белякова", description: "21 декабря 1897 года — дата рождения Александра Васильевича Белякова. Герой Советского Союза, совершил рекордные перелёты Москва — остров Удд и Москва — Северный полюс — Ванкувер. Проректор МФТИ.", category: "person" },
            { date: "1904-09-05", title: "Рождение Д.Ю. Панова", description: "5 сентября 1904 года — дата рождения Дмитрия Юрьевича Панова. Декан ФОПФ (1961–1962). Работал в области проблем точного приборостроения и теории упругости.", category: "person" },
            { date: "1906-12-08", title: "Рождение Г.С. Горелика", description: "8 декабря 1906 года — дата рождения Габриэля Семёновича Горелика. Первый декан ФОПФ (1955–1957). Внёс вклад в развитие статистической радиолокационной метеорологии.", category: "person" },
            { date: "1907-02-20", title: "Рождение Ф.И. Дубовицкого", description: "20 февраля (5 марта) 1907 года — дата рождения Фёдора Ивановича Дубовицкого. Директор МФТИ (1951–1952), ученик Н.Н. Семёнова. Заведовал кафедрой физики горения и взрыва.", category: "person" },
            { date: "1908-01-09", title: "Рождение Л.Д. Ландау", description: "9 (22) января 1908 года — дата рождения Льва Давидовича Ландау. Один из основателей МФТИ. Создатель теории сверхтекучести гелия. Нобелевская премия по физике 1962 года.", category: "person" },
            { date: "1908-10-27", title: "Рождение С.А. Христиановича", description: "27 октября (9 ноября) 1908 года — дата рождения Сергея Алексеевича Христиановича. Сыграл важную роль в создании МФТИ как самостоятельного института. Академик АН СССР.", category: "person" },
            { date: "1911-01-01", title: "Рождение Л.А. Симонова", description: "1911 год — дата рождения Льва Алексеевича Симонова. Первый декан ФАЛТ (1965–1977). Разработал теорию водяных турбин, применённую при создании турбин для отечественных гидростанций.", category: "person" },
            { date: "1916-07-11", title: "Рождение А.М. Прохорова", description: "11 июля 1916 года — дата рождения Александра Михайловича Прохорова. Один из создателей лазера. Нобелевская премия по физике 1964 года. Преподавал в МФТИ с 1971 года.", category: "person" },
            { date: "1917-07-25", title: "Рождение В.В. Воеводского", description: "25 июля 1917 года — дата рождения Владислава Владиславовича Воеводского. Первый декан ФМХФ (1953–1961). Открыл новый тип радикальных реакций — передачу активного центра.", category: "person" },
            { date: "1917-08-23", title: "Рождение Н.Н. Моисеева", description: "23 августа 1917 года — дата рождения Никиты Николаевича Моисеева. Организатор факультета ФУПМ (1969–1977). Основатель факультета ФАКИ. Один из основателей МНЭПУ.", category: "person" },
            { date: "1918-02-06", title: "Рождение А.А. Натана", description: "6 февраля 1918 года — дата рождения Андрея Александровича Натана. Декан ФУПМ (1979–1984). Разработал метод статистической фильтрации информации.", category: "person" },
            { date: "1921-05-21", title: "Рождение А.Д. Сахарова", description: "21 мая 1921 года — дата рождения Андрея Дмитриевича Сахарова. Профессор МФТИ. Один из создателей водородной бомбы. Нобелевская премия мира 1975 года.", category: "person" },
            { date: "1922-04-15", title: "Рождение В.Л. Тальрозе", description: "15 апреля 1922 года — дата рождения Виктора Львовича Тальрозе. Декан ФМХФ (1960–1983). Создал первый в стране масс-спектрометр для изучения элементарных актов сложных реакций.", category: "person" },
            { date: "1923-01-01", title: "Рождение В.И. Ноздрина", description: "1923 год — дата рождения Владимира Ивановича Ноздрина. Заместитель декана ФАКИ (1958–1967). Участник Великой Отечественной войны.", category: "person" },
            { date: "1925-08-29", title: "Рождение О.М. Белоцерковского", description: "29 августа 1925 года — дата рождения Олега Михайловича Белоцерковского. Ректор МФТИ (1962–1987). Выпускник МФТИ 1952 года.", category: "person" },
            { date: "1928-02-22", title: "Рождение Б.Н. Митяшева", description: "22 февраля 1928 года — дата рождения Бориса Николаевича Митяшева. Первый декан ФРТК (1956–1997). Разрабатывал системы приёма и обработки сигналов.", category: "person" },
            { date: "1928-02-27", title: "Рождение К.И. Артамонова", description: "27 февраля 1928 года — дата рождения Константина Ивановича Артамонова. Декан ФАКИ (1969–1977). Внёс вклад в развитие теории устойчивости ракетных двигателей.", category: "person" },
            { date: "1928-06-25", title: "Рождение А.А. Абрикосова", description: "25 июня 1928 года — дата рождения Алексея Алексеевича Абрикосова. Заведовал кафедрой теоретической физики в МФТИ (1972–1976). Нобелевская премия по физике 2003 года за теорию сверхпроводников.", category: "person" },

        let currentMonth = new Date().getMonth() + 1;
        let currentYear = 2026;

        const monthNames = [
            'Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
            'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'
        ];

        const categoryNames = {
            'history': 'История',
            'science': 'Наука',
            'culture': 'Культура',
            'sport': 'Спорт',
            'education': 'Образование',
            'person': 'Деятель'
        };

        function getEventsForDate(year, month, day) {
            const dayStr = `${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            return events.filter(e => e.date.endsWith(dayStr));
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthYearEl = document.getElementById('monthYear');
            
            monthYearEl.textContent = monthNames[currentMonth - 1]; // + ' ' + currentYear
            
            const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
            let firstDayIndex = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
            
            let html = '';
            
            // Empty cells for days before the first day of month
            for (let i = 0; i < firstDayIndex; i++) {
                html += `<div></div>`;
            }
            
            // Current month days
            for (let day = 1; day <= daysInMonth; day++) {
                const dayEvents = getEventsForDate(currentYear, currentMonth, day);
                const hasEvent = dayEvents.length > 0;
                const eventClass = hasEvent ? 'has-event' : '';
                const onclick = hasEvent ? `onclick="showModal(${currentYear}, ${currentMonth}, ${day})"` : '';
                
                html += `<div class="calendar-day ${eventClass}" ${onclick}><div class="day-number">${day}</div></div>`;
            }
            
            grid.innerHTML = html;
        }

        function showModal(year, month, day) {
            const dayEvents = getEventsForDate(year, month, day);
            if (dayEvents.length === 0) return;
            
            const modal = new bootstrap.Modal(document.getElementById('dateModal'));
            
            let eventsHtml = dayEvents.map(event => `
                <div class="mb-3">
                    <span class="category-badge category-${event.category}">${categoryNames[event.category]}</span>
                    <h5 class="mt-2">${event.title}</h5>
                    <p class="mb-0">${event.description}</p>
                </div>
            `).join('');
            
            const dateObj = new Date(year, month - 1, day);
            const dateStr = dateObj.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
            
            document.getElementById('modalTitle').textContent = dateStr;
            document.getElementById('modalBody').innerHTML = eventsHtml;
            modal.show();
        }

        document.getElementById('prevMonth').addEventListener('click', (e) => {
            e.preventDefault();
            currentMonth--;
            if (currentMonth < 1) {
                currentMonth = 12;
                currentYear--;
            }
            renderCalendar();
        });

        document.getElementById('nextMonth').addEventListener('click', (e) => {
            e.preventDefault();
            currentMonth++;
            if (currentMonth > 12) {
                currentMonth = 1;
                currentYear++;
            }
            renderCalendar();
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        renderCalendar();
    </script>
</body>
</html>
