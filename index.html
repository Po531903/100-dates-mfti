<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 дат МФТИ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --mipt-blue: #1a4d8f;
            --mipt-light: #e8f0f8;
            --mipt-dark: #0d2847;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        body {
            background: linear-gradient(135deg, var(--mipt-light) 0%, #fff 100%);
            min-height: 100vh;
            padding-bottom: 0;
        }
        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: var(--mipt-blue);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .fullscreen-btn:hover {
            background: var(--mipt-dark);
        }
        .navbar {
            background: var(--mipt-blue) !important;
            box-shadow: 0 4px 15px rgba(26, 77, 143, 0.3);
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
        }
        .card {
            border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 16px;
        }
        .calendar-header {
            background: var(--mipt-blue);
            color: white;
            border-radius: 16px 16px 0 0;
            padding: 20px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            width: 75%;
            margin: 0 auto;
        }
        .calendar-header-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 10px;
            width: 75%;
            margin-left: auto;
            margin-right: auto;
        }
.calendar-day {
            text-align: center;
            padding: 4px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            min-height: 50px;
            background: white;
            transition: all 0.2s;
            cursor: default;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            width: 100%;
            box-sizing: border-box;
        }
        .calendar-day:hover {
            background: var(--mipt-light);
        }
        .calendar-day.has-event {
            background: linear-gradient(135deg, var(--mipt-blue), #2a5fa0);
            color: white;
            cursor: pointer;
            font-weight: bold;
            border: 3px solid var(--mipt-dark);
            box-shadow: 0 0 10px rgba(26, 77, 143, 0.5);
        }
        .calendar-day.has-event:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(26, 77, 143, 0.4);
            z-index: 10;
            position: relative;
        }
        .calendar-day.other-month {
            background: #f5f5f5;
            color: #bbb;
        }
        .day-number {
            font-size: 0.85rem;
            font-weight: 600;
        }
        .event-indicator {
            font-size: 0.7rem;
            margin-top: 3px;
            opacity: 0.9;
        }
        .modal-header {
            background: var(--mipt-blue);
            color: white;
        }
        .btn-mipt {
            background: var(--mipt-blue);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            transition: all 0.3s;
        }
        .btn-mipt:hover {
            background: var(--mipt-dark);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(26, 77, 143, 0.4);
        }
        .nav-btn {
            background: white;
            border: 2px solid var(--mipt-blue);
            color: var(--mipt-blue);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            text-decoration: none;
        }
        .nav-btn:hover {
            background: var(--mipt-blue);
            color: white;
        }
        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .category-history { background: #e3f2fd; color: #1565c0; }
        .category-science { background: #e8f5e9; color: #2e7d32; }
        .category-culture { background: #fff3e0; color: #ef6c00; }
        .category-sport { background: #fce4ec; color: #c2185b; }
        .category-education { background: #f3e5f5; color: #7b1fa2; }
        .footer {
            background: var(--mipt-blue);
            color: white;
            padding: 20px 0;
            margin-top: 40px;
        }
        @media (max-width: 767.98px) {
            .calendar-day {
                min-height: 40px;
                padding: 2px;
            }
            .day-number {
                font-size: 0.9rem;
            }
            .event-indicator {
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body class="d-flex flex-column h-100">
    <button class="fullscreen-btn" id="fullscreenBtn" title="На весь экран">
        <i class="bi bi-arrows-fullscreen"></i>
    </button>

    <nav class="navbar navbar-expand-lg navbar-dark mb-0">
        <div class="container">
            <a class="navbar-brand d-none d-md-block" href="#">
                <i class="bi bi-calendar-event me-2"></i>100 дат МФТИ
            </a>
        </div>
    </nav>

    <main class="container-fluid flex-grow-1 d-flex flex-column align-items-center pt-2">
        <div class="text-center">
            <h1 class="display-2 fw-bold mb-1" style="color: var(--mipt-blue);">100 дат МФТИ</h1>
        </div>
        <div class="w-100" style="max-width: 1400px;">
            <div class="col-12">
                <div class="card">
                    <div class="calendar-header text-center py-3">
                        <div class="d-flex justify-content-between align-items-center px-3">
                            <a href="#" class="nav-btn" id="prevMonth">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                            <div>
                                <h2 class="mb-0" id="monthYear"></h2>
                            </div>
                            <a href="#" class="nav-btn" id="nextMonth">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </div>
                    </div>
                    <div class="card-body p-4">
                        <div class="calendar-header-row text-center fw-bold">
                            <div>Пн</div>
                            <div>Вт</div>
                            <div>Ср</div>
                            <div>Чт</div>
                            <div>Пт</div>
                            <div><span class="text-danger">Сб</span></div>
                            <div><span class="text-danger">Вс</span></div>
                        </div>
                        <div id="calendarGrid" class="calendar-grid"></div>
                        
                        <div class="text-center mt-4">
                            <p class="text-muted mb-2">
                                <i class="bi bi-info-circle me-1"></i>
                                Нажмите на выделенную дату, чтобы узнать о событии
                            </p>
                            <div class="d-flex justify-content-center gap-3 flex-wrap">
                                <span class="category-badge category-history"><i class="bi bi-book me-1"></i>История</span>
                                <span class="category-badge category-science"><i class="bi bi-lightbulb me-1"></i>Наука</span>
                                <span class="category-badge category-culture"><i class="bi bi-palette me-1"></i>Культура</span>
                                <span class="category-badge category-sport"><i class="bi bi-trophy me-1"></i>Спорт</span>
                                <span class="category-badge category-education"><i class="bi bi-mortarboard me-1"></i>Образование</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    

    <div class="modal fade" id="dateModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Дата</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const events = [
            { date: "1938-12-04", title: "Публикация идеи о высшей политехнической школе", description: "4 декабря 1938 года – публикация идеи о высшей политехнической школе. В газете «Правда» вышла статья о необходимости создания высшей политехнической школы, что стало началом «Системы физтеха».", category: "history" },
            { date: "1946-03-10", title: "Постановление о Высшей физико-технической школе", description: "10 марта 1946 года — постановление о Высшей физико-технической школе. Совет Народных Комиссаров СССР принял решение «Об организации Высшей физико-технической школы СССР».", category: "history" },
            { date: "1946-11-25", title: "Основание физико-технического факультета МГУ", description: "25 ноября 1946 года — дата основания физико-технического факультета МГУ (Физтеха). В этот день вышло постановление Совета Министров СССР о создании физико-технического факультета (ФТФ) МГУ. Эта дата считается днём рождения Физтеха.", category: "history" },
            { date: "1947-08-17", title: "Определение места размещения МФТИ", description: "17 августа 1947 года – «определение места размещения МФТИ». И. В. Сталин издал распоряжение о срочном переселении студентов физико-технического факультета МГУ из учебного корпуса на станцию Долгопрудная (1-й проезд, дом 4/2).", category: "history" },
            { date: "1951-09-17", title: "Создание самостоятельного МФТИ", description: "17 сентября 1951 года – создание самостоятельного МФТИ. Физтех выделен из состава МГУ в самостоятельный институт. В его состав вошли четыре факультета: радиотехнический, радиофизический, аэромеханический и физико-химический.", category: "history" },
            { date: "1952-04-01", title: "Назначение первого ректора МФТИ", description: "Апрель 1952 года – назначение первого ректора МФТИ. Генерал-лейтенант авиации Иван Фёдорович Петров был назначен директором, а позже — первым ректором МФТИ. Также в этом году был написан “первоначальный” гимн физтеха. Первоначально композиция была написана как гимн группы №114 в 1952 году.", category: "history" },
            { date: "1953-01-01", title: "Первый выпуск «коренных» физтехов", description: "1953 год – первый выпуск «коренных» физтехов. Состоялся первый выпуск студентов, поступивших уже непосредственно на Физтех. Дипломы получили 38 человек — те, кто остался из 118 человек, зачисленных на 1-й курс физико-технического факультета МГУ (ФТФ МГУ) в 1947 году.", category: "education" },
            { date: "1954-07-29", title: "Создание военной кафедры МФТИ", description: "29 июля 1954 года - дата создания военной кафедры МФТИ в соответствии с Постановлением Совета Министров СССР.", category: "education" },
            { date: "1955-10-12", title: "Открытие ФОПФ", description: "12 октября 1955 года – дата открытия факультета общей и прикладной физики (ФОПФ).", category: "education" },
            { date: "1956-01-01", title: "Открытие ФРТК и Нобелевская премия Семёнова", description: "1956 год — дата открытия факультета радиотехники и кибернетики (ФРТК). Также в 1956 году — дата получения Николаем Семёновым Нобелевской премии по химии (совместно с Сирилом Хиншелвудом) за разработку теории цепных реакций.", category: "science" },
            { date: "1957-06-01", title: "Открытие учебного полигона", description: "1957 год – открытие учебного полигона. Научно-учебный полигон в посёлке Орехово введён в эксплуатацию.", category: "education" },
            { date: "1957-01-01", title: "Создание ФМХФ", description: "1957 год — дата основания факультета молекулярной и химической физики (ФМХФ).", category: "education" },
            { date: "1958-09-01", title: "Первый номер газеты «За науку»", description: "1 сентября 1958 года – первый номер газеты «За науку». Стенная газета «За науку» была реорганизована в многотиражку. В 2013 году издание было перезапущено как глянцевый научно-популярный иллюстрированный журнал.", category: "culture" },
            { date: "1958-01-01", title: "Совершенствование МФТИ", description: "1958 год – «Совершенствование МФТИ». Было построено здание первой столовой института. В том же году на Физтехе открылась аспирантура, были открыты здравпункт МФТИ (в будущем поликлиника) и профилакторий.", category: "history" },
            { date: "1958-01-02", title: "Нобелевская премия И.Е. Тамма", description: "1958 год — дата получения Игорем Евгеньевичем Таммом Нобелевской премии по физике (совместно с Павлом Черенковым и Ильёй Франком). Формулировка Нобелевского комитета: «За открытие и истолкование эффекта Черенкова».", category: "science" },
            { date: "1961-01-25", title: "А.В. Беляков — проректор МФТИ", description: "С 25 января по сентябрь 1961 года – Александр Васильевич Беляков, Герой Советского Союза, занимал должность проректора по научной и учебной работе в МФТИ. Он стал Героем СССР за выполнение беспосадочного перелёта Москва — остров Удд и проявленные при этом мужество и героизм.", category: "history" },
            { date: "1962-11-01", title: "Нобелевская премия Л.Д. Ландау", description: "1 ноября 1962 года Лев Давидович Ландау получил Нобелевскую премию по физике. Премия получена «за пионерские исследования в теории конденсированного состояния, в особенности жидкого гелия».", category: "science" },
            { date: "1962-01-01", title: "Ректор О.М. Белоцерковский", description: "1962 год — дата назначения Олега Михайловича Белоцерковского ректором МФТИ. Олег Белоцерковский, выпускник МФТИ, возглавил институт и оставался на посту ректора 25 лет. Начался период расцвета Физтеха.", category: "history" },
            { date: "1964-05-01", title: "Создание ФФКЭ", description: "1 мая 1964 года – создание ФФКЭ. Был организован факультет физической и квантовой электроники (ФФКЭ).", category: "education" },
            { date: "1965-06-10", title: "Создание ФАЛТ", description: "10 июня 1965 года — дата основания ФАЛТ. Создан факультет аэромеханики и летательной техники (ФАЛТ).", category: "education" },
            { date: "1967-01-01", title: "Орден Трудового Красного Знамени", description: "1967 год — дата награждения Московского физико-технического института орденом Трудового Красного Знамени. Также в этом году был построен главный корпус МФТИ.", category: "history" },
            { date: "1969-07-19", title: "Создание ФУПМ", description: "19 июля 1969 года в Московском физико-техническом институте (МФТИ) появился факультет управления и прикладной математики (ФУПМ).", category: "education" },
            { date: "1975-03-04", title: "Открытие астероида «Физтех»", description: "4 марта 1975 года — дата открытия астероида «Физтех». Тамара Михайловна Смирнова в Крымской астрофизической обсерватории открыла астероид, позже названный в честь Физтеха. Название было предложено Институтом Теоретической Астрономии в Санкт-Петербурге в честь 50-летия ��ФТИ в 1996 году.", category: "science" },
            { date: "1975-08-08", title: "Создание ФПФЭ", description: "8 августа 1975 года – создание ФПФЭ. Совместным постановлением Президиума Академии наук СССР и Министерства высшего и среднего образования РСФСР было принято решение о создании факультета проблем физики и энергетики (ФПФЭ) в МФТИ.", category: "education" },
            { date: "1978-12-10", title: "Нобелевская премия П.Л. Капицы", description: "10 декабря 1978 года — дата вручения Нобелевской премии по физике академику Петру Леонидовичу Капице. Премия получена «за его базовые исследования и открытия в физике низких температур».", category: "science" },
            { date: "1982-01-01", title: "Создание ФФХБ", description: "1982 год — создание факультета физико-химической биологии (ФФХБ).", category: "education" },
            { date: "1982-08-19", title: "Первый космический полёт выпускника МФТИ", description: "19 августа 1982 года — дата первого космического полёта выпускника МФТИ. Александр Александрович Серебров – первый выпускник МФТИ, полетевший в космос. Позже совершил ещё три полёта. 27 августа 1982 года Указом Президиума Верховного Совета СССР он получил звание Героя Советского Союза.", category: "science" },
            { date: "1991-01-01", title: "Основание физтех-лицея", description: "1991 год – основание физтех-лицея. Начало работы физико-технического лицея имени П. Л. Капицы, специализированного учебного заведения для старшеклассников.", category: "education" },
            { date: "1997-01-01", title: "Создание ФМБФ", description: "1997 год - создан факультет молекулярной и биологической физики (ФМБФ). Факультет был создан на базе факультетов физико-химической биологии (ФФХБ) и молекулярной и химической физики (ФМХФ).", category: "education" },
            { date: "1999-06-01", title: "Переход на Болонскую систему", description: "Лето 1999 года — переход Московского физико-технического института (МФТИ) на Болонскую систему обучения «бакалавр — магистр».", category: "education" },
            { date: "2005-12-27", title: "Создание ФИВТ", description: "27 декабря 2005 года - был создан факультет инноваций и высоких технологий (ФИВТ).", category: "education" },
            { date: "2006-01-01", title: "Факультет нанотехнологий", description: "2006 год - в Московском физико-техническом институте (МФТИ) был открыт факультет нанотехнологий и информатики (ФНТИ). В 2009 году факультет был переименован в факультет ��ано-, био-, информационных и когнитивных технологий (ФНБИК).", category: "education" },
            { date: "2009-11-02", title: "Национальный исследовательский университет", description: "2 ноября 2009 года — дата получения статуса национального исследовательского университета. МФТИ вошёл в число ведущих исследовательских вузов России.", category: "education" },
            { date: "2010-10-05", title: "Нобелевская премия Гейма и Новосёлова", description: "5 октября 2010 года – получение Нобелевской премии выпускниками Андреем Геймом и Константином Новоселовым. Премия получена за «новаторские эксперименты по исследованию двумерного материала графена».", category: "science" },
            { date: "2021-09-11", title: "Открытие памятника отцам-основателям МФТИ", description: "11 сентября 2021 года – открытие памятника отцам-основателям МФТИ: П.Л. Капице, Н.Н. Семенову и Л.Д. Ландау.", category: "history" },
            { date: "2023-09-07", title: "Открытие станции метро «Физтех»", description: "7 сентября 2023 года – открытие «Физтеха». Была открыта станция метро салатовой ветки названная в честь физтеха.", category: "history" },
            { date: "2023-10-10", title: "Открытие памятника А.В. Белякову", description: "10 октября 2023 года – открытие памятника Герою Советского Союза Александру Белякову.", category: "history" }
        ];

        let currentMonth = new Date().getMonth() + 1;
        let currentYear = 2026;

        const monthNames = [
            'Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
            'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'
        ];

        const categoryNames = {
            'history': 'История',
            'science': 'Наука',
            'culture': 'Культура',
            'sport': 'Спорт',
            'education': 'Образование',
            'person': 'Деятель'
        };

        function getEventsForDate(year, month, day) {
            const dayStr = `${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            return events.filter(e => e.date.endsWith(dayStr));
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthYearEl = document.getElementById('monthYear');
            
            monthYearEl.textContent = monthNames[currentMonth - 1]; // + ' ' + currentYear
            
            const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
            let firstDayIndex = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
            
            let html = '';
            
            // Empty cells for days before the first day of month
            for (let i = 0; i < firstDayIndex; i++) {
                html += `<div></div>`;
            }
            
            // Current month days
            for (let day = 1; day <= daysInMonth; day++) {
                const dayEvents = getEventsForDate(currentYear, currentMonth, day);
                const hasEvent = dayEvents.length > 0;
                const eventClass = hasEvent ? 'has-event' : '';
                const onclick = hasEvent ? `onclick="showModal(${currentYear}, ${currentMonth}, ${day})"` : '';
                
                html += `<div class="calendar-day ${eventClass}" ${onclick}><div class="day-number">${day}</div></div>`;
            }
            
            grid.innerHTML = html;
        }

        function showModal(year, month, day) {
            const dayEvents = getEventsForDate(year, month, day);
            if (dayEvents.length === 0) return;
            
            const modal = new bootstrap.Modal(document.getElementById('dateModal'));
            
            let eventsHtml = dayEvents.map(event => `
                <div class="mb-3">
                    <span class="category-badge category-${event.category}">${categoryNames[event.category]}</span>
                    <h5 class="mt-2">${event.title}</h5>
                    <p class="mb-0">${event.description}</p>
                </div>
            `).join('');
            
            const dateObj = new Date(year, month - 1, day);
            const dateStr = dateObj.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
            
            document.getElementById('modalTitle').textContent = dateStr;
            document.getElementById('modalBody').innerHTML = eventsHtml;
            modal.show();
        }

        document.getElementById('prevMonth').addEventListener('click', (e) => {
            e.preventDefault();
            currentMonth--;
            if (currentMonth < 1) {
                currentMonth = 12;
                currentYear--;
            }
            renderCalendar();
        });

        document.getElementById('nextMonth').addEventListener('click', (e) => {
            e.preventDefault();
            currentMonth++;
            if (currentMonth > 12) {
                currentMonth = 1;
                currentYear++;
            }
            renderCalendar();
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        renderCalendar();
    </script>
</body>
</html>
